<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャゲーム</title>

<style>
body{
    font-family: sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    margin:0;
    padding:30px;
}

h1{
    font-size:40px;
    margin-bottom:20px;
}

button{
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background: gold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
}

#result{
    margin-top:40px;
    font-size:28px;
    padding:20px;
    border-radius:15px;
    min-height:100px;
}

.card{
    margin-top:20px;
    padding:30px;
    border-radius:20px;
    display:inline-block;
    font-size:24px;
    animation: pop 0.5s ease;
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

.N {background: gray;}
.R {background: dodgerblue;}
.SR {background: purple;}
.SSR {background: gold; color:black;}
</style>
</head>

<body>

<h1>✨ ドキドキガチャ ✨</h1>

<button onclick="gacha()">ガチャを引く！</button>

<div id="result"></div>

<script>
const characters = [
    {name:"スライム", rarity:"N", rate:50},
    {name:"戦士", rarity:"R", rate:30},
    {name:"魔法使い", rarity:"SR", rate:15},
    {name:"伝説のドラゴン", rarity:"SSR", rate:5}
];

function gacha(){
    let rand = Math.random()*100;
    let total = 0;
    let resultChar;

    for(let char of characters){
        total += char.rate;
        if(rand <= total){
            resultChar = char;
            break;
        }
    }

    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = `
        <div class="card ${resultChar.rarity}">
            ${resultChar.rarity} ★<br>
            ${resultChar.name}
        </div>
    `;
}
</script>

</body>
</html>
